<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/swiftspace/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="swiftspace">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>swiftspace</title>
  <link rel="manifest" href="manifest.json">
</head>
  <style>
    body {
      background: radial-gradient(circle at center, #1a1c1e 0%, #0c0d0e 100%);
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-screen {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.5s ease-out;
    }
    .glass-container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .logo-glow {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Outfit', 'Inter', sans-serif;
      font-size: 48px;
      font-weight: 800;
      color: white;
      margin-bottom: 30px;
      box-shadow: 0 0 30px rgba(58, 123, 213, 0.4);
      animation: pulse 2s infinite ease-in-out;
    }
    .app-name {
      color: white;
      font-family: 'Outfit', 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .app-subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
      margin-bottom: 40px;
    }
    .loader-bar {
      width: 180px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .loader-progress {
      width: 30%;
      height: 100%;
      background: #3a7bd5;
      border-radius: 2px;
      position: absolute;
      animation: progress 1.5s infinite ease-in-out;
      box-shadow: 0 0 10px #3a7bd5;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(58, 123, 213, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(58, 123, 213, 0.6); }
    }
    @keyframes progress {
      0% { left: -30%; width: 10%; }
      50% { left: 20%; width: 60%; }
      100% { left: 100%; width: 10%; }
    }
    .fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loading-screen">
    <div class="glass-container">
      <div class="logo-glow">S</div>
      <div class="app-name">SWIFT SPACE</div>
      <div class="app-subtitle">Initializing Secure Space</div>
      <div class="loader-bar">
        <div class="loader-progress"></div>
      </div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function() {
      // Monitor Flutter Initialization
      var loadingScreen = document.getElementById('loading-screen');
      
      // We check for the app-container or wait for a specific duration
      // But the best way is to use a callback if we customized flutter_bootstrap
      // For now, we'll watch if the flutter-view appears or use a safety timeout
      
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.addedNodes.length > 0) {
            for (var i = 0; i < mutation.addedNodes.length; i++) {
              if (mutation.addedNodes[i].tagName === 'FLUTTER-VIEW') {
                setTimeout(function() {
                  loadingScreen.classList.add('fade-out');
                  setTimeout(() => loadingScreen.remove(), 500);
                }, 200);
                observer.disconnect();
              }
            }
          }
        });
      });
      
      observer.observe(document.body, { childList: true });

      // Fallback: If it takes too long but engine is ready
      setTimeout(function() {
        if (!loadingScreen.classList.contains('fade-out')) {
           loadingScreen.classList.add('fade-out');
           setTimeout(() => loadingScreen.remove(), 500);
        }
      }, 10000); // 10s safety
    });
  </script>
</body>
</html>
