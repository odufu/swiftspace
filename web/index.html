<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="swiftspace">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>swiftspace</title>
  <link rel="manifest" href="manifest.json">
</head>
  <style>
    body {
      background: #0F5A3F;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-screen {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.4s ease-out;
    }
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.8s ease-out;
    }
    .logo-box {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      margin-bottom: 24px;
    }
    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 56px;
      font-weight: 800;
      color: #0F5A3F;
    }
    .app-title {
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loading-screen">
    <div class="splash-container">
      <div class="logo-box">
        <span class="logo-text">S</span>
      </div>
      <div class="app-title">SwiftSpace</div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function() {
      // Monitor Flutter Initialization
      var loadingScreen = document.getElementById('loading-screen');
      
      // We check for the app-container or wait for a specific duration
      // But the best way is to use a callback if we customized flutter_bootstrap
      // For now, we'll watch if the flutter-view appears or use a safety timeout
      
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.addedNodes.length > 0) {
            for (var i = 0; i < mutation.addedNodes.length; i++) {
              if (mutation.addedNodes[i].tagName === 'FLUTTER-VIEW') {
                setTimeout(function() {
                  loadingScreen.classList.add('fade-out');
                  setTimeout(() => loadingScreen.remove(), 500);
                }, 200);
                observer.disconnect();
              }
            }
          }
        });
      });
      
      observer.observe(document.body, { childList: true });

      // Fallback: If it takes too long but engine is ready
      setTimeout(function() {
        if (!loadingScreen.classList.contains('fade-out')) {
           loadingScreen.classList.add('fade-out');
           setTimeout(() => loadingScreen.remove(), 500);
        }
      }, 10000); // 10s safety
    });
  </script>
</body>
</html>
